<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>
<body>
   <div class="main-container">
        <img src="" alt="Todos os pratos (banner)">

    <h1>Menu - Faça sua Escolha</h1>

    <div class="prato-principal">
        <div class="title-principal">
            Prato Principal
        </div>

        <div class="desc-pratos">
            Todos os pratos acompanham arroz, feijão e a sobremesa do dia
        </div>

        <div class="card-pratos">
            <div class="card">
                <img src="" alt="Bife">
                Bife com Batata
            </div>
            
            <div class="card">
                <img src="" alt="Coxa de Frango">
                Coxa de Frango Crocante
            </div>

            <div class="card">
                <img src="" alt="Carne de panela">
                Carne de Panela
            </div>

        </div>



    </div>

    <div class="acompanhamentos">
        <div class="title-acomp">
            Acompanhamentos
        </div>

        <div class="desc-acomp">
            Porções para uma pessoa
        </div>

        <div class="card-acomps">

            <div class="card">
                <img src="" alt="Farofa">
                Farofa
            </div>

            <div class="card">
                <img src="" alt="Salada">
                Salada
            </div>
        
            <div class="card">
                <img src="" alt="Torresmo">
                Torresmo
            </div>


        </div>

        <div class="form">
            <div class="title-form">
                Dados Pessoais
            </div>
            <input type="text" id="nomeClient" placeholder="Digite seu nome:">
            <input type="number" id="phoneClient" placeholder="Digite seu telefone:">
            <input type="email" id="emailClient" placeholder="Digite seu email:">
        </div>

        <button id="btnCalcular">Calcular</button>

    </div>

   </div>
    
</body>
</html>
